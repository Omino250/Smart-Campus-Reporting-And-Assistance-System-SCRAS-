{% extends 'base.html' %}

{% block title %}Login - SCRAS{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-lg-5 col-md-7">
            <div class="card shadow-lg border-0 fade-in">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-gradient text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" 
                             style="width: 80px; height: 80px;">
                            <i class="bi bi-person-circle fs-1"></i>
                        </div>
                        <h2 class="fw-bold">Welcome Back</h2>
                        <p style="color: var(--text-secondary);">Login to access your account</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> Email Address
                            </label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="your.email@maseno.ac.ke" required autofocus>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">
                                <i class="bi bi-lock"></i> Password
                            </label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter your password" required>
                        </div>
                        
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">
                                Remember me
                            </label>
                        </div>
                        
                        <button type="submit" class="btn btn-gradient w-100 py-2 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                        
                        <div class="text-center">
                            <a href="#" style="color: var(--gradient-start); text-decoration: none;">
                                Forgot Password?
                            </a>
                        </div>
                    </form>
                    
                    <hr class="my-4" style="border-color: var(--border-color);">
                    
                    <div class="text-center">
                        <p style="color: var(--text-secondary);">Don't have an account?</p>
                        <a href="{% url 'grievances:register' %}" class="btn btn-outline-gradient w-100">
                            <i class="bi bi-person-plus"></i> Create Account
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="text-center mt-4">
                <small style="color: var(--text-secondary);">
                    By logging in, you agree to our 
                    <a href="#" style="color: var(--gradient-start);">Terms of Service</a> and 
                    <a href="#" style="color: var(--gradient-start);">Privacy Policy</a>
                </small>
            </div>
        </div>
    </div>
</div>

<style>
    .fade-in {
        animation: fadeIn 0.6s ease-out;
    }
</style>
{% endblock %}
